<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LoL Match Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Roboto', sans-serif; margin: 0; padding: 20px; }
        h1 { color: #58a6ff; text-shadow: 0 0 10px rgba(88, 166, 255, 0.3); text-align: center; }
        .main-container { max-width: 1200px; margin: 0 auto; }
        .container { display: flex; justify-content: space-between; gap: 20px; margin-top: 30px; }
        .team { flex: 1; background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        .blue { border-top: 4px solid #1f6feb; }
        .red { border-top: 4px solid #f85149; }
        h3 { margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 10px; }

        /* Стили для строки игрока */
        .player-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
        input, select {
            background: #0d1117; border: 1px solid #30363d; color: white;
            padding: 8px; border-radius: 6px; font-size: 13px;
        }
        input:focus, select:focus { border-color: #58a6ff; outline: none; }

        .lane-select { width: 70px; }
        .name-input { flex: 2; }
        .tag-input { width: 50px; }
        .champ-input { flex: 1.5; }

        button {
            background: linear-gradient(180deg, #238636 0%, #2ea043 100%);
            color: white; padding: 15px 40px; border: none; border-radius: 8px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.1s;
        }
        button:hover { transform: scale(1.05); }
        .hint { font-size: 0.8em; color: #8b949e; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="main-container">
    <h1>LoL Match Analyzer</h1>
    <p class="hint">Выберите линию, введите Ник, Тег и Чемпиона, на котором планируете играть</p>

    <form action="/analyze" method="post">
        <div class="container">
            <!-- Синяя команда -->
            <div class="team blue">
                <h3>Team A (Blue)</h3>
                <div th:each="i : ${#numbers.sequence(0, 4)}" class="player-row">
                    <select th:name="'teamA[' + ${i} + '].lane'" class="lane-select">
                        <option th:value="TOP" th:text="TOP" th:selected="${i==0}"></option>
                        <option th:value="JNG" th:text="JNG" th:selected="${i==1}"></option>
                        <option th:value="MID" th:text="MID" th:selected="${i==2}"></option>
                        <option th:value="ADC" th:text="ADC" th:selected="${i==3}"></option>
                        <option th:value="SUP" th:text="SUP" th:selected="${i==4}"></option>
                    </select>
                    <input type="text" th:name="'teamA[' + ${i} + '].name'" placeholder="Name" class="name-input">
                    <input type="text" th:name="'teamA[' + ${i} + '].tag'" placeholder="EUW" class="tag-input">
                    <input type="text" th:name="'teamA[' + ${i} + '].championName'" placeholder="Champion" class="champ-input">
                </div>
            </div>

            <!-- Красная команда -->
            <div class="team red">
                <h3>Team B (Red)</h3>
                <div th:each="i : ${#numbers.sequence(0, 4)}" class="player-row">
                    <select th:name="'teamB[' + ${i} + '].lane'" class="lane-select">
                        <option th:value="TOP" th:text="TOP" th:selected="${i==0}"></option>
                        <option th:value="JNG" th:text="JNG" th:selected="${i==1}"></option>
                        <option th:value="MID" th:text="MID" th:selected="${i==2}"></option>
                        <option th:value="ADC" th:text="ADC" th:selected="${i==3}"></option>
                        <option th:value="SUP" th:text="SUP" th:selected="${i==4}"></option>
                    </select>
                    <input type="text" th:name="'teamB[' + ${i} + '].name'" placeholder="Name" class="name-input">
                    <input type="text" th:name="'teamB[' + ${i} + '].tag'" placeholder="EUW" class="tag-input">
                    <input type="text" th:name="'teamB[' + ${i} + '].championName'" placeholder="Champion" class="champ-input">
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button type="submit">АНАЛИЗИРОВАТЬ</button>
        </div>
    </form>
</div>
</body>
</html>
